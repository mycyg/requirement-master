name: Build macOS Client

on:
  workflow_dispatch:
  push:
    tags:
      - "client-macos-v*"

permissions:
  contents: write

jobs:
  macos-universal:
    name: macOS universal DMG
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust targets
        run: |
          rustup default stable
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Typecheck shared package
        run: npm run build --workspace=shared

      - name: Build unsigned macOS client
        run: |
          npm run tauri:build --workspace=client-tauri -- \
            --bundles dmg,app \
            --target universal-apple-darwin \
            --no-sign

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: yqgl-client-macos-universal-unsigned
          if-no-files-found: error
          path: |
            client-tauri/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            client-tauri/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app

      - name: Publish macOS release asset
        if: startsWith(github.ref, 'refs/tags/client-macos-v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          dmg="$(find client-tauri/src-tauri/target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' -type f | head -n 1)"
          test -n "$dmg"
          asset="yqgl-client-macos-universal-unsigned.dmg"
          cp "$dmg" "$asset"
          notes="Unsigned macOS universal client build. For internal testing, macOS Gatekeeper may require right-click Open."
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$asset" --clobber
            gh release edit "$GITHUB_REF_NAME" --latest=false
          else
            gh release create "$GITHUB_REF_NAME" "$asset" --title "$GITHUB_REF_NAME" --notes "$notes" --latest=false
          fi
