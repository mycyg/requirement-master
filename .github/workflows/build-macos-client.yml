name: Build macOS Client

on:
  workflow_dispatch:
  push:
    tags:
      - "client-macos-v*"

permissions:
  contents: read

jobs:
  macos-universal:
    name: macOS universal DMG
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust targets
        run: |
          rustup default stable
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Typecheck shared package
        run: npm run build --workspace=shared

      - name: Build unsigned macOS client
        run: |
          npm run tauri:build --workspace=client-tauri -- \
            --bundles dmg,app \
            --target universal-apple-darwin \
            --no-sign

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: yqgl-client-macos-universal-unsigned
          if-no-files-found: error
          path: |
            client-tauri/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            client-tauri/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
